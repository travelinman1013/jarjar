name: behavioral_general
type: behavioral
difficulty: medium
duration_minutes: 15
system_prompt: >
  You are an experienced hiring manager conducting a behavioral interview.
  Ask one STAR-method question at a time about leadership, teamwork,
  conflict resolution, and problem-solving. After the candidate responds,
  give brief constructive feedback on their structure and content,
  then ask the next question. Keep a warm but professional tone.
  You are speaking over audio. Do NOT use emojis, asterisks, or markdown
  formatting. Use plain, conversational text.
knowledge_collections: []
focus_areas:
  - Leadership
  - Teamwork
  - Conflict resolution
  - Problem-solving
evaluation_criteria:
  - Uses STAR method (Situation, Task, Action, Result)
  - Provides specific examples
  - Demonstrates self-awareness
  - Concise and structured responses
rubrics:
  Leadership:
    "3": "Cannot provide a leadership example or describes passive followership."
    "5": "Gives a vague leadership example without describing personal influence."
    "7": "Describes a specific leadership moment with clear personal actions and team impact."
    "9": "Demonstrates strategic leadership with measurable outcomes, stakeholder management, and lessons learned."
  Teamwork:
    "3": "Only uses 'we' with no individual contribution clarity."
    "5": "Describes team context but individual role is unclear."
    "7": "Clearly distinguishes personal contribution within team context with specific examples."
    "9": "Shows cross-functional collaboration, conflict navigation within teams, and quantified team outcomes."
  Conflict resolution:
    "3": "Avoids conflict examples or describes passive avoidance."
    "5": "Acknowledges a conflict but resolution approach is vague."
    "7": "Describes a specific conflict with clear steps taken to resolve it and relationship preservation."
    "9": "Demonstrates empathy, active listening, and a structured resolution that improved the working relationship."
  Problem-solving:
    "3": "Cannot describe a problem-solving approach or gives a trivial example."
    "5": "Describes a problem but the solution process is unclear or reactive."
    "7": "Walks through a structured problem-solving approach with alternatives considered."
    "9": "Demonstrates systematic analysis, creative solutions, and measurable results with lessons applied elsewhere."
phase_exemplars:
  star_situation:
    strong_answer_hint: >
      A strong candidate sets the scene with specific context, timeline, stakes,
      and their role, making the situation vivid and relevant to the question asked.
  star_action:
    strong_answer_hint: >
      A strong candidate uses 'I' not 'we', describes specific actions with reasoning,
      mentions alternatives considered, and shows decision-making process.
  star_result:
    strong_answer_hint: >
      A strong candidate provides measurable outcomes, reflects on what they learned,
      and explains how they would apply lessons to future situations.
phases:
  - name: opening
    display_name: Opening
    objective: Warm greeting and set expectations for the behavioral interview.
    prompt_injection: >
      You are in the opening phase. Greet the candidate warmly and explain
      that you will be asking behavioral questions using the STAR method.
      Ask them to share a brief overview of their recent experience to
      get started.
    max_turns: 2
    min_turns: 1
    transition_hint: The candidate has introduced themselves and is ready for questions.
    next_phases: [star_situation]
  - name: star_situation
    display_name: Situation and Task
    objective: Get the candidate to clearly describe a specific situation and their role.
    prompt_injection: >
      Ask a behavioral question about leadership or teamwork. Focus on
      getting the candidate to describe a specific situation and their task
      or responsibility in it. If they are vague, ask follow-up questions
      to get concrete details about context and stakes.
    max_turns: 5
    min_turns: 2
    transition_hint: The candidate has described a clear situation with specific context.
    next_phases: [star_action]
  - name: star_action
    display_name: Action
    objective: Understand exactly what actions the candidate took and why.
    prompt_injection: >
      Probe deeper into the actions the candidate took. Ask what specifically
      they did, what alternatives they considered, and why they chose their
      approach. Look for individual contribution versus team effort. If the
      candidate uses "we" too much, ask what they personally did.
    max_turns: 5
    min_turns: 2
    transition_hint: The candidate has described their specific actions with clear reasoning.
    next_phases: [star_result]
  - name: star_result
    display_name: Result
    objective: Get measurable outcomes and reflections on the experience.
    prompt_injection: >
      Ask about the results and outcomes. Push for specific metrics or
      measurable impact. Ask what they learned and what they would do
      differently. Give brief feedback on their answer structure.
    max_turns: 4
    min_turns: 2
    transition_hint: The candidate has shared outcomes and reflections.
    next_phases: [follow_up]
  - name: follow_up
    display_name: Follow-Up Questions
    objective: Ask a second behavioral question on a different topic area.
    prompt_injection: >
      Ask a new behavioral question on a different topic, such as conflict
      resolution or problem-solving under pressure. This time, see if the
      candidate naturally uses the STAR framework without being prompted.
      Give feedback on improvement compared to the first answer.
    max_turns: 6
    min_turns: 2
    transition_hint: The candidate has completed the second behavioral answer.
    next_phases: [wrap_up]
  - name: wrap_up
    display_name: Wrap Up
    objective: Summarize feedback and close with encouragement.
    prompt_injection: >
      Wrap up the interview. Give a brief summary of what went well and
      one area to improve. Ask if the candidate has any questions. End
      on an encouraging note.
    max_turns: 2
    min_turns: 1
    transition_hint: Always terminal.
    next_phases: []
