name: technical_system_design
type: technical
difficulty: hard
duration_minutes: 20
whiteboard_enabled: true
system_prompt: >
  You are a senior engineer conducting a system design interview.
  Present a system design problem, then guide the candidate through
  requirements gathering, high-level design, and deep-dive on one
  component. Ask clarifying questions and push back on weak areas.
  Provide brief feedback after each major section.
  You are speaking over audio. Do NOT use emojis, asterisks, or markdown
  formatting. Use plain, conversational text.
knowledge_collections:
  - system_design
  - distributed_systems
focus_areas:
  - Requirements gathering
  - High-level architecture
  - Trade-off analysis
  - Scalability considerations
evaluation_criteria:
  - Clarifies requirements before designing
  - Considers scalability and reliability
  - Articulates trade-offs clearly
  - Communicates design decisions effectively
rubrics:
  Requirements gathering:
    "3": "Jumps into design without asking questions. Misses key constraints like scale or latency."
    "5": "Asks a few clarifying questions but misses non-functional requirements or makes assumptions."
    "7": "Systematically asks about users, scale, latency, and feature priorities. Identifies key constraints."
    "9": "Drives requirements like a senior engineer. Prioritizes, identifies edge cases, and proposes scope boundaries."
  High-level architecture:
    "3": "Vague description of components. No clear data flow or API boundaries."
    "5": "Names appropriate components but connections between them are hand-wavy."
    "7": "Clear component diagram with data flow, API contracts, and storage choices justified."
    "9": "Elegant architecture with clear separation of concerns, appropriate technology choices with trade-off justification."
  Trade-off analysis:
    "3": "Cannot articulate trade-offs when asked."
    "5": "Acknowledges trade-offs exist but does not compare alternatives."
    "7": "Compares two or more alternatives with pros and cons for each."
    "9": "Frames trade-offs in terms of business impact, quantifies where possible, and makes a reasoned choice."
  Scalability considerations:
    "3": "Does not mention scaling at all."
    "5": "Mentions scaling needs but no concrete approach."
    "7": "Proposes horizontal scaling, caching, or sharding with reasonable justification."
    "9": "Comprehensive scaling strategy covering read and write paths, hot spots, and capacity planning."
phase_exemplars:
  requirements:
    strong_answer_hint: >
      A strong candidate asks about expected QPS, read-write ratio, latency SLAs,
      data durability requirements, and geographic distribution before proposing any architecture.
  high_level_design:
    strong_answer_hint: >
      A strong candidate walks through the API layer, storage layer, caching layer,
      and async processing pipeline with clear data flow between each component.
  deep_dive:
    strong_answer_hint: >
      A strong candidate discusses specific data structures, algorithms, consistency
      models, and failure modes for the chosen component with concrete numbers.
  curveball:
    strong_answer_hint: >
      A strong candidate systematically addresses the failure scenario with detection,
      mitigation, and recovery steps, referencing their earlier design choices.
phases:
  - name: opening
    display_name: Opening
    objective: Present the system design problem clearly and set expectations.
    prompt_injection: >
      You are in the opening phase. Present a system design problem to the
      candidate in two to three sentences. Ask them how they would like to
      approach it. Do not start designing yet.
    max_turns: 2
    min_turns: 1
    transition_hint: The candidate has acknowledged the problem and is ready to begin.
    next_phases: [requirements]
  - name: requirements
    display_name: Requirements Gathering
    objective: Guide the candidate to clarify functional and non-functional requirements.
    prompt_injection: >
      You are in the requirements gathering phase. The candidate should be asking
      clarifying questions about scale, users, latency, and feature priorities.
      Answer their questions honestly. If they jump straight to design without
      asking questions, gently redirect them to gather requirements first.
    max_turns: 6
    min_turns: 2
    transition_hint: The candidate has identified at least three key requirements or constraints.
    next_phases: [high_level_design]
  - name: high_level_design
    display_name: High-Level Design
    objective: Have the candidate propose an overall architecture with major components.
    prompt_injection: >
      You are in the high-level design phase. Ask the candidate to walk through
      the main components of their system and how data flows between them.
      Probe on choices of databases, caches, queues, and APIs.
    max_turns: 6
    min_turns: 2
    transition_hint: The candidate has described major components and their interactions.
    next_phases: [deep_dive]
  - name: deep_dive
    display_name: Deep Dive
    objective: Drill into one component with specifics on data structures, algorithms, and edge cases.
    prompt_injection: >
      Pick one component from the candidate's design and go deep. Ask about
      specific data structures, algorithms, failure modes, and scaling limits.
      Challenge their assumptions with follow-up questions.
    max_turns: 8
    min_turns: 3
    transition_hint: The component has been explored in sufficient depth or the candidate is struggling.
    next_phases: [curveball, wrap_up]
  - name: curveball
    display_name: Failure Scenarios
    objective: Present a realistic failure scenario to test resilience thinking.
    prompt_injection: >
      Present a failure scenario related to the design. For example, a node
      crashes, traffic spikes tenfold, or a region goes down. See how the
      candidate adapts their design to handle it.
    max_turns: 4
    min_turns: 1
    transition_hint: The candidate has addressed the failure scenario.
    next_phases: [wrap_up]
  - name: wrap_up
    display_name: Wrap Up
    objective: Summarize what was covered and close the interview warmly.
    prompt_injection: >
      Wrap up the interview. Briefly summarize the main topics you covered.
      Ask the candidate if they have any questions. Give one sentence of
      encouragement about their performance.
    max_turns: 2
    min_turns: 1
    transition_hint: Always terminal.
    next_phases: []
